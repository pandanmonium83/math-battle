<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Duel</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5b6472;
        --line: #d9e0ea;
        --panel: #ffffff;
        --bg: #f4f7fb;
        --brand: #246bfe;
        --brand-strong: #174fc2;
        --good: #11845b;
        --warn: #b35c00;
        --bad: #bc2f35;
        --shadow: 0 14px 34px rgba(23, 32, 42, 0.09);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 0.78rem 1rem;
        color: #fff;
        background: var(--brand);
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        background: var(--brand-strong);
      }

      button.secondary {
        color: var(--ink);
        background: #e8edf5;
      }

      button.secondary:hover {
        background: #dbe3ef;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .shell {
        width: min(1120px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3.2rem);
        line-height: 1;
      }

      .brand p {
        margin: 0.45rem 0 0;
        color: var(--muted);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
        color: var(--muted);
        background: #fff;
        font-weight: 700;
        white-space: nowrap;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 360px) 1fr;
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .panel-inner {
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 800;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.75rem 0.8rem;
        color: var(--ink);
        background: #fff;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .players {
        display: grid;
        gap: 10px;
      }

      .player-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }

      .player-card strong {
        display: block;
      }

      .player-card span {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .score {
        font-size: 1.35rem;
        font-weight: 900;
      }

      .arena {
        min-height: 570px;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .game-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        border-bottom: 1px solid var(--line);
        padding: 16px 18px;
      }

      .progress {
        color: var(--muted);
        font-weight: 800;
      }

      .timer {
        min-width: 92px;
        border-radius: 999px;
        padding: 0.5rem 0.7rem;
        color: #fff;
        background: var(--ink);
        text-align: center;
        font-weight: 900;
      }

      .question-zone {
        display: grid;
        place-items: center;
        padding: 26px 18px;
        text-align: center;
      }

      .prompt-label {
        margin: 0 0 12px;
        color: var(--muted);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .question {
        margin: 0;
        font-size: clamp(3rem, 11vw, 7.4rem);
        line-height: 1;
        font-weight: 950;
      }

      .answer-row {
        width: min(560px, 100%);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin: 26px auto 0;
      }

      .answer-row input {
        font-size: 1.35rem;
        text-align: center;
      }

      .feedback {
        min-height: 88px;
        border-top: 1px solid var(--line);
        padding: 14px 18px 18px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .result-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fbfcff;
      }

      .result-card.good {
        border-color: rgba(17, 132, 91, 0.35);
      }

      .result-card.bad {
        border-color: rgba(188, 47, 53, 0.35);
      }

      .small {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      .winner {
        color: var(--good);
        font-weight: 950;
      }

      .error {
        color: var(--bad);
        font-weight: 800;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .settings-grid,
        .result-grid {
          grid-template-columns: 1fr;
        }

        .answer-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>Math Duel</h1>
          <p>Two players. Same room. Fast, accurate mental math wins.</p>
        </div>
        <div class="status-pill" id="connectionStatus">Connecting...</div>
      </header>

      <section class="layout">
        <aside class="panel">
          <div class="panel-inner stack">
            <div class="field">
              <label for="playerName">Player name</label>
              <input id="playerName" maxlength="18" placeholder="Player" />
            </div>
            <div class="field">
              <label for="roomCode">Room code</label>
              <input id="roomCode" maxlength="12" placeholder="MATH" />
            </div>
            <button id="joinBtn">Join Room</button>
            <div class="small" id="shareLine"></div>
            <div class="error" id="errorLine"></div>

            <hr style="width: 100%; border: 0; border-top: 1px solid var(--line)" />

            <div class="settings-grid">
              <div class="field">
                <label for="mode">Mode</label>
                <select id="mode">
                  <option value="addition">Addition</option>
                  <option value="subtraction">Subtraction</option>
                  <option value="multiplication">Multiplication</option>
                  <option value="division">Division</option>
                  <option value="percents">Percents</option>
                  <option value="mixed">Mixed</option>
                </select>
              </div>
              <div class="field">
                <label for="digits">Digits</label>
                <select id="digits">
                  <option value="1">1 digit</option>
                  <option value="2">2 digits</option>
                  <option value="3">3 digits</option>
                  <option value="4">4 digits</option>
                </select>
              </div>
              <div class="field">
                <label for="questions">Questions</label>
                <input id="questions" type="number" min="3" max="30" value="10" />
              </div>
              <div class="field">
                <label for="seconds">Seconds</label>
                <input id="seconds" type="number" min="5" max="30" value="12" />
              </div>
              <div class="field" style="grid-column: 1 / -1">
                <label for="nearTolerancePercent">Close range (%)</label>
                <input id="nearTolerancePercent" type="number" min="1" max="25" value="25" />
              </div>
            </div>
            <button id="startBtn" disabled>Start Game</button>
            <button id="resetBtn" class="secondary" disabled>Back to Lobby</button>

            <hr style="width: 100%; border: 0; border-top: 1px solid var(--line)" />

            <div>
              <h2 style="margin: 0 0 10px; font-size: 1.1rem">Players</h2>
              <div class="players" id="players"></div>
            </div>
          </div>
        </aside>

        <section class="panel arena">
          <div class="game-head">
            <div>
              <strong id="roomTitle">Join a room to begin</strong>
              <div class="progress" id="progressText">Waiting</div>
            </div>
            <div class="timer" id="timerText">--</div>
          </div>

          <div class="question-zone">
            <div style="width: 100%">
              <p class="prompt-label" id="promptLabel">Lobby</p>
              <h2 class="question" id="questionText">Ready?</h2>
              <form class="answer-row" id="answerForm">
                <input id="answerInput" inputmode="decimal" autocomplete="off" placeholder="Type answer" disabled />
                <button id="answerBtn" type="submit" disabled>Submit</button>
              </form>
              <p class="small" id="answerStatus"></p>
            </div>
          </div>

          <div class="feedback" id="feedback">
            <div class="empty">Create a room, share the link, and start when both players are in.</div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      const state = {
        room: null,
        me: null,
        currentQuestion: null,
        answered: false,
        timerHandle: null,
        eventSource: null,
      };

      const params = new URLSearchParams(window.location.search);
      $("roomCode").value = params.get("room") || "MATH";
      $("playerName").value = localStorage.getItem("mathDuelName") || "";
      $("connectionStatus").textContent = "Not joined";

      async function api(route, payload) {
        const response = await fetch(route, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Request failed.");
        return data;
      }

      function currentRoomCode() {
        return String($("roomCode").value || "MATH").trim().toUpperCase().slice(0, 12) || "MATH";
      }

      function playerStorageKey(roomCode) {
        return `mathDuelPlayer:${roomCode}`;
      }

      function connectEvents() {
        if (!state.room || !state.me) return;
        if (state.eventSource) state.eventSource.close();

        const url = `/events?room=${encodeURIComponent(state.room.code)}&playerId=${encodeURIComponent(state.me.id)}`;
        state.eventSource = new EventSource(url);

        state.eventSource.onopen = () => {
          $("connectionStatus").textContent = "Online";
        };

        state.eventSource.onerror = () => {
          $("connectionStatus").textContent = "Reconnecting...";
        };

        state.eventSource.addEventListener("room:update", (event) => {
          state.room = JSON.parse(event.data);
          renderRoom();
        });

        state.eventSource.addEventListener("game:question", (event) => {
          showQuestion(JSON.parse(event.data));
        });

        state.eventSource.addEventListener("answer:accepted", (event) => {
          const result = JSON.parse(event.data);
          $("answerStatus").textContent = `${result.feedback}. Waiting for the round to finish.`;
        });

        state.eventSource.addEventListener("game:result", (event) => {
          state.currentQuestion = null;
          $("answerInput").disabled = true;
          $("answerBtn").disabled = true;
          renderResults(JSON.parse(event.data));
        });

        state.eventSource.addEventListener("game:over", (event) => {
          showGameOver(JSON.parse(event.data));
        });
      }

      function settingsFromForm() {
        return {
          mode: $("mode").value,
          digits: Number($("digits").value),
          questions: Number($("questions").value),
          seconds: Number($("seconds").value),
          nearTolerancePercent: Number($("nearTolerancePercent").value),
        };
      }

      function setSettings(settings) {
        $("mode").value = settings.mode;
        $("digits").value = String(settings.digits);
        $("questions").value = settings.questions;
        $("seconds").value = settings.seconds;
        $("nearTolerancePercent").value = settings.nearTolerancePercent;
      }

      function amHost() {
        return Boolean(state.room?.players?.find((player) => player.id === state.me?.id)?.isHost);
      }

      function updateShareLine() {
        if (!state.room) {
          $("shareLine").textContent = "";
          return;
        }
        const url = new URL(window.location.href);
        url.searchParams.set("room", state.room.code);
        $("shareLine").textContent = `Share this link: ${url.toString()}`;
        history.replaceState(null, "", `?room=${state.room.code}`);
      }

      function renderPlayers() {
        const players = state.room?.players || [];
        $("players").innerHTML = players.length
          ? players
              .map(
                (player) => `
                  <div class="player-card">
                    <div>
                      <strong>${escapeHtml(player.name)}${player.id === state.me?.id ? " (you)" : ""}</strong>
                      <span>${player.isHost ? "Host" : "Challenger"} · Streak ${player.perfectStreak}</span>
                    </div>
                    <div class="score">${player.score}</div>
                  </div>
                `
              )
              .join("")
          : `<div class="empty">No players yet.</div>`;
      }

      function renderRoom() {
        const room = state.room;
        const joined = Boolean(room);
        const host = amHost();
        const inLobby = room?.status === "lobby";

        $("roomTitle").textContent = joined ? `Room ${room.code}` : "Join a room to begin";
        $("progressText").textContent = joined
          ? room.status === "playing"
            ? `Question ${room.questionIndex} of ${room.settings.questions}`
            : room.status === "finished"
              ? "Game finished"
              : "Lobby"
          : "Waiting";

        $("startBtn").disabled = !host || !inLobby || room.players.length < 1;
        $("resetBtn").disabled = !host || !joined || inLobby;
        document.querySelectorAll("#mode, #digits, #questions, #seconds, #nearTolerancePercent").forEach((input) => {
          input.disabled = !host || !inLobby;
        });

        if (joined) setSettings(room.settings);
        updateShareLine();
        renderPlayers();
      }

      function startTimer(question) {
        clearInterval(state.timerHandle);
        const endsAt = question.startedAt + question.seconds * 1000;

        function tick() {
          const remaining = Math.max(0, endsAt - Date.now());
          $("timerText").textContent = `${Math.ceil(remaining / 1000)}s`;
          if (remaining <= 0) clearInterval(state.timerHandle);
        }

        tick();
        state.timerHandle = setInterval(tick, 200);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[char];
        });
      }

      function renderResults(payload) {
        $("feedback").innerHTML = `
          <div class="small" style="margin-bottom: 8px">Correct answer: <strong>${escapeHtml(payload.correctAnswer)}</strong></div>
          <div class="result-grid">
            ${payload.results
              .map((result) => {
                const good = result.points > 0;
                return `
                  <div class="result-card ${good ? "good" : "bad"}">
                    <strong>${escapeHtml(result.name)}</strong>
                    <div>${escapeHtml(result.feedback)} · +${result.points} pts</div>
                    <div class="small">
                      Guess: ${escapeHtml(result.guess || "none")} · Time: ${(result.elapsedMs / 1000).toFixed(1)}s
                    </div>
                    <div class="small">
                      Correct ${result.correctnessPoints}, speed ${result.speedBonus}, perfect ${result.perfectBonus}, streak ${result.streakBonus}
                    </div>
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function showQuestion(question) {
        state.currentQuestion = question;
        state.answered = false;
        $("promptLabel").textContent = `${question.mode} · question ${question.number} of ${question.total}`;
        $("questionText").textContent = question.prompt;
        $("answerInput").value = "";
        $("answerInput").disabled = false;
        $("answerBtn").disabled = false;
        $("answerStatus").textContent = "";
        $("feedback").innerHTML = `<div class="empty">Solve it fast, but accuracy unlocks the speed bonus.</div>`;
        $("answerInput").focus();
        startTimer(question);
      }

      function showGameOver({ standings }) {
        clearInterval(state.timerHandle);
        $("timerText").textContent = "--";
        $("promptLabel").textContent = "Final";
        $("questionText").textContent = standings[0] ? `${standings[0].name} wins` : "Game over";
        $("feedback").innerHTML = `
          <div class="result-grid">
            ${standings
              .map(
                (player) => `
                  <div class="result-card ${player.rank === 1 ? "good" : ""}">
                    <strong class="${player.rank === 1 ? "winner" : ""}">#${player.rank} ${escapeHtml(player.name)}</strong>
                    <div>${player.score} points</div>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      $("joinBtn").addEventListener("click", async () => {
        const roomCode = currentRoomCode();
        const name = $("playerName").value || "Player";
        localStorage.setItem("mathDuelName", name);
        $("errorLine").textContent = "";

        try {
          const data = await api("/api/join", {
            roomCode,
            name,
            playerId: localStorage.getItem(playerStorageKey(roomCode)),
          });
          state.me = data.player;
          state.room = data.room;
          localStorage.setItem(playerStorageKey(roomCode), state.me.id);
          renderRoom();
          connectEvents();
        } catch (error) {
          $("errorLine").textContent = error.message;
        }
      });

      $("startBtn").addEventListener("click", async () => {
        if (!state.room || !state.me) return;
        try {
          await api("/api/settings", {
            roomCode: state.room.code,
            playerId: state.me.id,
            settings: settingsFromForm(),
          });
          await api("/api/start", { roomCode: state.room.code, playerId: state.me.id });
        } catch (error) {
          $("errorLine").textContent = error.message;
        }
      });

      $("resetBtn").addEventListener("click", async () => {
        if (!state.room || !state.me) return;
        try {
          await api("/api/reset", { roomCode: state.room.code, playerId: state.me.id });
        } catch (error) {
          $("errorLine").textContent = error.message;
        }
      });

      document.querySelectorAll("#mode, #digits, #questions, #seconds, #nearTolerancePercent").forEach((input) => {
        input.addEventListener("change", () => {
          if (amHost() && state.room?.status === "lobby") {
            api("/api/settings", {
              roomCode: state.room.code,
              playerId: state.me.id,
              settings: settingsFromForm(),
            }).catch((error) => {
              $("errorLine").textContent = error.message;
            });
          }
        });
      });

      $("answerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.currentQuestion || state.answered || !state.room || !state.me) return;
        const answer = $("answerInput").value;
        state.answered = true;
        $("answerBtn").disabled = true;
        $("answerInput").disabled = true;
        $("answerStatus").textContent = "Answer locked.";
        try {
          await api("/api/answer", {
            roomCode: state.room.code,
            playerId: state.me.id,
            answer,
          });
        } catch (error) {
          $("answerStatus").textContent = error.message;
        }
      });
    </script>
  </body>
</html>
